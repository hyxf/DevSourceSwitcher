name: Build Universal macOS DMG (DevSourceSwitcher)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-universal:
    name: Build Universal DMG
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: |
          brew install xcodegen

      - name: Generate Xcode project using xcodegen
        run: |
          xcodegen generate

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2.0"

      - name: Verify Xcode
        run: xcodebuild -version

      # Intel (x86_64) 架构构建
      - name: Build x86_64
        run: |
          xcodebuild \
            -scheme DevSourceSwitcher \
            -configuration Release \
            -derivedDataPath build-x64 \
            -destination "platform=macOS,arch=x86_64" \
            clean build

      # Apple Silicon (arm64) 架构构建
      - name: Build arm64
        run: |
          xcodebuild \
            -scheme DevSourceSwitcher \
            -configuration Release \
            -derivedDataPath build-arm64 \
            -destination "platform=macOS,arch=arm64" \
            clean build

      - name: Create Universal App
        run: |
          APP_NAME="DevSourceSwitcher.app"
          EXEC_NAME="DevSourceSwitcher"

          X64_APP="build-x64/Build/Products/Release/$APP_NAME"
          ARM_APP="build-arm64/Build/Products/Release/$APP_NAME"

          UNIVERSAL_DIR="dist"
          UNIVERSAL_APP="$UNIVERSAL_DIR/$APP_NAME"

          rm -rf "$UNIVERSAL_DIR"
          mkdir -p "$UNIVERSAL_DIR"

          # 复制 ARM 架构的应用结构
          cp -R "$ARM_APP" "$UNIVERSAL_APP"

          # 合并可执行文件
          lipo -create \
            "$X64_APP/Contents/MacOS/$EXEC_NAME" \
            "$ARM_APP/Contents/MacOS/$EXEC_NAME" \
            -output "$UNIVERSAL_APP/Contents/MacOS/$EXEC_NAME"

          # 验证架构
          lipo -archs "$UNIVERSAL_APP/Contents/MacOS/$EXEC_NAME"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create Universal DMG
        run: |
          DMG_NAME="DevSourceSwitcher-macOS-universal.dmg"

          create-dmg \
            --volname "DevSourceSwitcher" \
            --window-size 700 400 \
            --icon-size 120 \
            --icon "DevSourceSwitcher.app" 180 170 \
            --hide-extension "DevSourceSwitcher.app" \
            --app-drop-link 520 170 \
            "$DMG_NAME" \
            "dist"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: DevSourceSwitcher-macOS-universal.dmg
