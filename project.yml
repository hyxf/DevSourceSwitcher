name: DevSourceSwitcher

options:
  bundleIdPrefix: xyz.billchiu
  deploymentTarget:
    macOS: "14.0"

targets:
  DevSourceSwitcher:
    type: application
    platform: macOS

    sources:
      - path: DevSourceSwitcher

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xyz.billchiu.DevSourceSwitcher
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        ENABLE_APP_SANDBOX: NO

    info:
      properties:
        CFBundleName: Dev Source Switcher
        CFBundleDisplayName: Dev Source Switcher
        LSUIElement: YES
        LSBackgroundOnly: NO
        NSSupportsAutomaticGraphicsSwitching: YES
