name: DevSourceSwitcher

options:
  bundleIdPrefix: xyz.billchiu
  deploymentTarget:
    macOS: "14.0"

targets:
  DevSourceSwitcher:
    type: application
    platform: macOS

    sources:
      - path: DevSourceSwitcher
        type: group

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xyz.billchiu.DevSourceSwitcher
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: DevSourceSwitcher/Info.plist
        ENABLE_APP_SANDBOX: NO

    info:
      path: DevSourceSwitcher/Info.plist
